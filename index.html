<!DOCTYPE html>
<html lang="id" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>IKBAL Portal Pesantren - Lubabuth Tholibin</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        slate: { 850: '#141E33', 900: '#0F172A', 950: '#020617' },
                        pesantren: { green: '#10b981', gold: '#fbbf24', dark: '#064e3b' }
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        .page { display: none; }
        .page.active { display: block; animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .glass-panel { background: rgba(30, 41, 59, 0.4); border: 1px solid rgba(255, 255, 255, 0.05); backdrop-filter: blur(8px); }
        .admin-only { display: none !important; }
        body.is-admin .admin-only { display: flex !important; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .ripple:active { transform: scale(0.98); }
        input[type="date"], input[type="time"] { color-scheme: dark; }
    </style>
</head>
<body class="bg-slate-950 text-slate-200 min-h-screen">

    <div class="flex flex-col h-screen max-w-md mx-auto relative bg-slate-950 shadow-2xl overflow-hidden">
        
        <!-- HEADER -->
        <header class="px-6 pt-8 pb-4 bg-slate-950/90 backdrop-blur-md border-b border-slate-900 z-40">
            <div class="flex flex-col items-center text-center relative">
                <img src="https://i.postimg.cc/dtcCfxNM/2437-removebg-preview.png" alt="Logo" class="w-14 h-14 mb-3 cursor-pointer ripple" onclick="switchNav('beranda')">
                <p id="app-subtitle" class="text-[12px] font-black uppercase tracking-[0.25em] text-pesantren-green mb-1">👋 Halo Santri</p>
                <h1 id="app-title" class="text-xl font-extrabold text-white">Beranda Utama</h1>
                <div class="absolute right-0 bottom-2">
                    <button onclick="toggleModal('adminModal', true)" class="w-10 h-10 rounded-2xl glass-panel flex items-center justify-center text-slate-400 ripple">
                        <i class="ph-bold ph-shield-check text-lg"></i>
                    </button>
                </div>
            </div>
        </header>

        <!-- MAIN CONTENT -->
        <main id="main-content" class="flex-1 overflow-y-auto px-6 pb-32 pt-2 space-y-6 no-scrollbar">
            
            <section id="page-beranda" class="page active space-y-6">
                <div id="loker-banner-container"></div>
                <div class="grid grid-cols-4 gap-4">
                    <button onclick="switchNav('loker')" class="flex flex-col items-center gap-2">
                        <div class="w-14 h-14 rounded-2xl bg-blue-500/10 text-blue-400 flex items-center justify-center border border-blue-500/20"><i class="ph-bold ph-briefcase text-2xl"></i></div>
                        <span class="text-[10px] font-bold text-slate-400 uppercase">Loker</span>
                    </button>
                    <button onclick="switchNav('kajian')" class="flex flex-col items-center gap-2">
                        <div class="w-14 h-14 rounded-2xl bg-purple-500/10 text-purple-400 flex items-center justify-center border border-purple-500/20"><i class="ph-bold ph-book-open-text text-2xl"></i></div>
                        <span class="text-[10px] font-bold text-slate-400 uppercase">Kajian</span>
                    </button>
                    <button onclick="switchNav('donasi')" class="flex flex-col items-center gap-2">
                        <div class="w-14 h-14 rounded-2xl bg-pesantren-gold/10 text-pesantren-gold flex items-center justify-center border border-pesantren-gold/20"><i class="ph-bold ph-hand-heart text-2xl"></i></div>
                        <span class="text-[10px] font-bold text-slate-400 uppercase">Infaq</span>
                    </button>
                    <button onclick="switchNav('alumni')" class="flex flex-col items-center gap-2">
                        <div class="w-14 h-14 rounded-2xl bg-emerald-500/10 text-emerald-400 flex items-center justify-center border border-emerald-500/20"><i class="ph-bold ph-users text-2xl"></i></div>
                        <span class="text-[10px] font-bold text-slate-400 uppercase">Alumni</span>
                    </button>
                </div>
            </section>

            <section id="page-loker" class="page space-y-4">
                <div class="sticky top-0 bg-slate-950 pt-2 pb-2 z-10"><h2 class="text-lg font-bold text-white">Lowongan Kerja</h2></div>
                <div id="loker-list" class="space-y-4"></div>
            </section>

            <section id="page-alumni" class="page space-y-4">
                <div class="sticky top-0 bg-slate-950 pt-2 pb-4 z-10">
                    <div class="flex gap-2">
                        <div class="relative flex-1">
                            <i class="ph ph-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-slate-500"></i>
                            <input type="text" id="searchInput" oninput="window.filterAlumni()" placeholder="Cari nama atau domisili..." class="w-full bg-slate-900 border border-slate-800 rounded-2xl pl-12 pr-4 py-3.5 text-sm text-white focus:outline-none focus:border-pesantren-green">
                        </div>
                        <button onclick="window.exportAlumniToCSV()" class="admin-only w-12 h-12 bg-slate-800 text-pesantren-green rounded-2xl flex items-center justify-center border border-slate-700 ripple shadow-lg">
                            <i class="ph-bold ph-download-simple text-xl"></i>
                        </button>
                    </div>
                </div>
                <div id="alumni-list-mobile" class="space-y-3"></div>
            </section>

            <section id="page-donasi" class="page space-y-6 text-center">
                <div class="glass-panel p-8 rounded-[32px]">
                    <p class="text-xs font-bold text-slate-400 uppercase mb-2">Total Infaq</p>
                    <h2 id="total-infaq-display" class="text-3xl font-black text-white">Rp 0</h2>
                </div>
                <button onclick="toggleModal('userDonasiModal', true)" class="w-full py-4 bg-pesantren-green text-slate-950 font-black rounded-2xl uppercase text-sm ripple">Konfirmasi Infaq</button>
                <div id="donation-verified-list" class="space-y-3 text-left pt-4 border-t border-slate-800"></div>
            </section>

            <section id="page-kajian" class="page space-y-4">
                <div class="sticky top-0 bg-slate-950 pt-2 pb-2 z-10"><h2 class="text-lg font-bold text-white">Jadwal Kajian</h2></div>
                <div id="kajian-list" class="space-y-3"></div>
            </section>
        </main>

        <button id="fab-add" onclick="handleFabAction()" class="hidden fixed bottom-28 right-6 w-16 h-16 rounded-3xl bg-pesantren-green text-slate-950 shadow-2xl flex items-center justify-center z-50 ripple">
            <i class="ph-bold ph-plus text-2xl"></i>
        </button>

        <nav class="fixed bottom-0 left-0 right-0 bg-slate-900/90 backdrop-blur-md border-t border-slate-800 z-50">
            <div class="flex items-center justify-around py-4 max-w-md mx-auto">
                <button onclick="switchNav('beranda')" class="nav-btn text-pesantren-green flex flex-col items-center gap-1" id="nav-beranda"><i class="ph-fill ph-house-simple text-xl"></i><span class="text-[9px] font-bold uppercase">Home</span></button>
                <button onclick="switchNav('loker')" class="nav-btn text-slate-500 flex flex-col items-center gap-1" id="nav-loker"><i class="ph-fill ph-briefcase text-xl"></i><span class="text-[9px] font-bold uppercase">Loker</span></button>
                <button onclick="switchNav('kajian')" class="nav-btn text-slate-500 flex flex-col items-center gap-1" id="nav-kajian"><i class="ph-fill ph-book-open-text text-xl"></i><span class="text-[9px] font-bold uppercase">Kajian</span></button>
                <button onclick="switchNav('donasi')" class="nav-btn text-slate-500 flex flex-col items-center gap-1" id="nav-donasi"><i class="ph-fill ph-hand-heart text-xl"></i><span class="text-[9px] font-bold uppercase">Infaq</span></button>
                <button onclick="switchNav('alumni')" class="nav-btn text-slate-500 flex flex-col items-center gap-1" id="nav-alumni"><i class="ph-fill ph-users text-xl"></i><span class="text-[9px] font-bold uppercase">Alumni</span></button>
            </div>
        </nav>
    </div>

    <!-- TOAST -->
    <div id="toast" class="fixed top-12 left-6 right-6 z-[1000] transform -translate-y-48 transition-all duration-500 pointer-events-none">
        <div id="toast-content" class="bg-slate-900 border border-pesantren-green/30 text-white px-5 py-4 rounded-2xl shadow-2xl flex items-center gap-3">
            <div id="toast-icon-bg" class="w-8 h-8 rounded-full bg-pesantren-green flex items-center justify-center text-slate-950"><i class="ph-bold ph-check" id="toast-icon"></i></div>
            <p id="toast-msg" class="text-xs font-bold"></p>
        </div>
    </div>

    <!-- MODAL ADMIN -->
    <div id="adminModal" class="fixed inset-0 z-[200] hidden flex items-center justify-center p-6 bg-slate-950/90">
        <div class="absolute inset-0" onclick="closeActiveModal()"></div>
        <div class="relative bg-slate-900 w-full max-w-xs p-8 rounded-[40px] border border-slate-800">
            <h3 class="text-xl font-bold text-center text-white mb-6">Akses Admin</h3>
            <input type="password" id="adminPin" maxlength="6" placeholder="••••••" class="w-full bg-slate-950 border border-slate-800 rounded-2xl py-4 text-center text-3xl tracking-[0.5em] text-pesantren-green mb-4 focus:outline-none">
            <button onclick="handleLogin()" class="w-full bg-pesantren-green text-slate-950 font-black py-4 rounded-2xl uppercase ripple">Login</button>
            <button onclick="logout()" id="btn-logout" class="hidden w-full mt-4 text-red-500 font-bold text-xs uppercase ripple text-center">Logout</button>
            <button onclick="closeActiveModal()" class="w-full mt-4 text-slate-500 font-bold text-xs uppercase ripple text-center">Batal</button>
        </div>
    </div>

    <!-- MODAL ALUMNI -->
    <div id="alumniFormModal" class="fixed inset-0 z-[300] hidden flex items-end justify-center bg-slate-950/80">
        <div class="absolute inset-0" onclick="closeActiveModal()"></div>
        <div class="relative bg-slate-900 w-full max-w-md p-8 rounded-t-[40px] border-t border-slate-800 overflow-y-auto max-h-[85vh]">
            <h3 class="text-xl font-bold text-white mb-6">Data Alumni</h3>
            <form id="alumniForm" class="space-y-4">
                <input type="hidden" id="alumniId">
                <input type="text" id="alumniNama" required placeholder="Nama Lengkap" class="w-full bg-slate-950 border border-slate-800 rounded-2xl px-4 py-3.5 text-white">
                <select id="alumniKelamin" required class="w-full bg-slate-950 border border-slate-800 rounded-2xl px-4 py-3.5 text-white appearance-none">
                    <option value="" disabled selected>Pilih Jenis Kelamin</option>
                    <option value="Laki-laki">Laki-laki (Putra)</option>
                    <option value="Perempuan">Perempuan (Putri)</option>
                </select>
                <input type="text" id="alumniAlamat" required placeholder="Domisili (Desa)" class="w-full bg-slate-950 border border-slate-800 rounded-2xl px-4 py-3.5 text-white">
                <input type="text" id="alumniKontak" placeholder="WhatsApp (08...)" class="w-full bg-slate-950 border border-slate-800 rounded-2xl px-4 py-3.5 text-white">
                <button type="submit" class="w-full bg-pesantren-green text-slate-950 font-black py-4 rounded-2xl uppercase ripple">Simpan</button>
                <button type="button" id="btnHapusAlumni" class="hidden w-full bg-red-500/10 text-red-500 py-3 rounded-2xl font-bold ripple">Hapus Data Ini</button>
            </form>
        </div>
    </div>

    <!-- MODAL LOKER -->
    <div id="lokerFormModal" class="fixed inset-0 z-[300] hidden flex items-end justify-center bg-slate-950/80">
        <div class="absolute inset-0" onclick="closeActiveModal()"></div>
        <div class="relative bg-slate-900 w-full max-w-md p-8 rounded-t-[40px] border-t border-slate-800">
            <h3 class="text-xl font-bold text-white mb-6">Tambah Lowongan</h3>
            <form id="lokerForm" class="space-y-4">
                <input type="hidden" id="lokerId">
                <input type="text" id="lokerJudul" required placeholder="Judul / Posisi Pekerjaan" class="w-full bg-slate-950 border border-slate-800 rounded-2xl px-4 py-3.5 text-white">
                <input type="date" id="lokerTanggal" required class="w-full bg-slate-950 border border-slate-800 rounded-2xl px-4 py-3.5 text-white">
                <textarea id="lokerIsi" rows="4" required placeholder="Detail, Syarat & Kontak Lamar..." class="w-full bg-slate-950 border border-slate-800 rounded-2xl px-4 py-3.5 text-white"></textarea>
                <button type="submit" class="w-full bg-blue-500 text-white font-black py-4 rounded-2xl uppercase ripple">Simpan Loker</button>
                <button type="button" id="btnHapusLoker" class="hidden w-full bg-red-500/10 text-red-500 py-3 rounded-2xl font-bold ripple">Hapus Loker</button>
            </form>
        </div>
    </div>

    <!-- MODAL KAJIAN -->
    <div id="kajianFormModal" class="fixed inset-0 z-[300] hidden flex items-end justify-center bg-slate-950/80">
        <div class="absolute inset-0" onclick="closeActiveModal()"></div>
        <div class="relative bg-slate-900 w-full max-w-md p-8 rounded-t-[40px] border-t border-slate-800">
            <h3 class="text-xl font-bold text-white mb-6">Jadwal Kajian</h3>
            <form id="kajianForm" class="space-y-4">
                <input type="hidden" id="kajianId">
                <input type="text" id="kajianKitab" required placeholder="Nama Kitab" class="w-full bg-slate-950 border border-slate-800 rounded-2xl px-4 py-3.5 text-white">
                <input type="text" id="kajianGuru" required placeholder="Guru / Pengasuh" class="w-full bg-slate-950 border border-slate-800 rounded-2xl px-4 py-3.5 text-white">
                <input type="time" id="kajianWaktu" required class="w-full bg-slate-950 border border-slate-800 rounded-2xl px-4 py-3.5 text-white">
                <button type="submit" class="w-full bg-purple-500 text-white font-black py-4 rounded-2xl uppercase ripple">Simpan Jadwal</button>
                <button type="button" id="btnHapusKajian" class="hidden w-full bg-red-500/10 text-red-500 py-3 rounded-2xl font-bold ripple">Hapus Jadwal</button>
            </form>
        </div>
    </div>

    <!-- MODAL DETAIL LOKER -->
    <div id="newsDetailModal" class="fixed inset-0 z-[300] hidden flex items-center justify-center p-6 bg-slate-950/95 backdrop-blur-md">
        <div class="absolute inset-0" onclick="closeActiveModal()"></div>
        <div class="relative bg-slate-900 w-full max-w-md p-8 rounded-[40px] border border-slate-800 shadow-2xl">
            <div class="flex justify-between items-start mb-4">
                <h3 id="newsDetailTitle" class="text-xl font-bold text-white"></h3>
                <span id="newsDetailDate" class="text-[10px] text-slate-500"></span>
            </div>
            <div id="newsDetailContent" class="text-sm text-slate-400 mb-8 whitespace-pre-line leading-relaxed"></div>
            <div id="newsDetailActions" class="space-y-3"></div>
            <button onclick="closeActiveModal()" class="w-full py-3 bg-slate-800 text-white rounded-2xl font-bold mt-4 ripple">Tutup</button>
        </div>
    </div>

    <!-- MODAL INFAQ -->
    <div id="userDonasiModal" class="fixed inset-0 z-[300] hidden flex items-end justify-center bg-slate-950/80">
        <div class="absolute inset-0" onclick="closeActiveModal()"></div>
        <div class="relative bg-slate-900 w-full max-w-md p-8 rounded-t-[40px] border-t border-slate-800">
            <h3 class="text-xl font-bold text-white mb-6">Konfirmasi Infaq</h3>
            <form id="userDonasiForm" class="space-y-4">
                <input type="text" id="userDonasiNama" required placeholder="Nama Donatur (atau Hamba Allah)" class="w-full bg-slate-950 border border-slate-800 rounded-2xl px-4 py-3.5 text-white">
                <input type="number" id="userDonasiNominal" required placeholder="Nominal Rp" class="w-full bg-slate-950 border border-slate-800 rounded-2xl px-4 py-3.5 text-white">
                <p class="text-[10px] text-slate-500 text-center">Silakan transfer ke BSI 7123456789 a.n IKBAL sebelum konfirmasi.</p>
                <button type="submit" class="w-full bg-pesantren-green text-slate-950 font-black py-4 rounded-2xl uppercase ripple">Kirim Laporan</button>
            </form>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw8KJ8xzkBClhqRf2rDbTy2bhag8FL-gB3UzwOJbQVkP_FHipukAgqybvUb9UoIPzjd/exec";
        const PIN_ADMIN = "123456";
        let activePage = 'beranda', toastTimeout;
        let allAlumni = [], allLoker = [], allSchedules = [], allConfirms = [];
        let totalInfaq = 0, bankInfo = {};

        // --- GLOBAL UI ---
        window.showToast = (msg, type = 'success') => {
            const t = document.getElementById('toast');
            const bg = document.getElementById('toast-icon-bg');
            const icon = document.getElementById('toast-icon');
            document.getElementById('toast-msg').innerText = msg;
            bg.className = `w-8 h-8 rounded-full flex items-center justify-center text-slate-950 ${type === 'error' ? 'bg-red-500' : 'bg-pesantren-green'}`;
            icon.className = `ph-bold ${type === 'error' ? 'ph-x' : 'ph-check'}`;
            t.classList.remove('-translate-y-48'); t.classList.add('translate-y-0');
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => { t.classList.remove('translate-y-0'); t.classList.add('-translate-y-48'); }, 3000);
        };

        const generateId = () => Math.floor(10000 + Math.random() * 90000).toString();
        const formatIDR = (v) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', maximumFractionDigits: 0 }).format(v);
        
        // --- HISTORY & BACK HANDLER ---
        window.toggleModal = (id, show) => { 
            const el = document.getElementById(id);
            if(el) {
                if(show) { el.classList.remove('hidden'); history.pushState({ modalOpen: true, modalId: id }, ""); }
                else { el.classList.add('hidden'); }
            }
        };
        window.closeActiveModal = () => { history.back(); };
        window.onpopstate = () => {
            const modals = ['adminModal', 'alumniFormModal', 'lokerFormModal', 'kajianFormModal', 'newsDetailModal', 'userDonasiModal'];
            modals.forEach(id => { const el = document.getElementById(id); if(el) el.classList.add('hidden'); });
        };

        // --- DATA ENGINE ---
        async function fetchAPI(action, payload = {}) {
            try {
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({ action, ...payload })
                });
                return await response.json();
            } catch(e) { console.error(e); throw e; }
        }

        window.initData = async () => {
            try {
                const response = await fetch(SCRIPT_URL + "?action=getData");
                const data = await response.json();
                
                // Pastikan ID ada untuk sinkronisasi lokal
                const fixId = (list) => (list || []).map(i => { if(!i.id) i.id = generateId(); return i; });
                allAlumni = fixId(data.alumni);
                allLoker = fixId(data.loker);
                allSchedules = fixId(data.schedules);
                allConfirms = data.konfirmasi || [];
                totalInfaq = Number(data.totalInfaq) || 0;
                bankInfo = data.bankInfo || {};
                
                refreshUI();
            } catch(e) { window.showToast("Gagal memuat data", "error"); }
        };

        function refreshUI() {
            renderAlumni(allAlumni);
            renderLokerList(allLoker);
            renderSchedules(allSchedules);
            renderConfirms(allConfirms);
            document.getElementById('total-infaq-display').innerText = formatIDR(totalInfaq);
        }

        function switchNav(id) {
            activePage = id;
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => { b.classList.remove('text-pesantren-green'); b.classList.add('text-slate-500'); });
            document.getElementById('page-' + id).classList.add('active');
            const btn = document.getElementById('nav-' + id);
            if(btn) btn.classList.add('text-pesantren-green');
            const titles = { beranda:['Beranda Utama','👋 Halo Santri'], loker:['Lowongan Kerja','Peluang Karir'], donasi:['Infaq','Amal Jariyah'], alumni:['Alumni','Buku Induk'], kajian:['Kajian','Majelis Ilmu'] };
            document.getElementById('app-title').innerText = titles[id][0];
            document.getElementById('app-subtitle').innerText = titles[id][1];
            const fab = document.getElementById('fab-add');
            if(document.body.classList.contains('is-admin') && !['beranda','donasi'].includes(id)) fab.classList.remove('hidden'); else fab.classList.add('hidden');
        }

        function handleLogin() {
            if(document.getElementById('adminPin').value === PIN_ADMIN) {
                document.body.classList.add('is-admin');
                document.getElementById('btn-logout').classList.remove('hidden');
                history.back(); switchNav(activePage); refreshUI(); window.showToast("Mode Admin Aktif");
            } else window.showToast("PIN Salah", "error");
        }

        function logout() {
            document.body.classList.remove('is-admin');
            document.getElementById('btn-logout').classList.add('hidden');
            document.getElementById('adminPin').value = "";
            history.back(); switchNav(activePage); refreshUI(); window.showToast("Admin Logout");
        }

        // --- RENDERING ---
        function renderAlumni(data) {
            const container = document.getElementById('alumni-list-mobile'), isAdmin = document.body.classList.contains('is-admin');
            if(!data.length) { container.innerHTML = '<p class="py-10 text-center text-slate-600 italic text-xs">Belum ada data alumni.</p>'; return; }
            container.innerHTML = data.sort((a,b) => a.nama.localeCompare(b.nama)).map(a => {
                const genderIcon = a.kelamin === 'Laki-laki' ? 'ph-bold ph-gender-male text-blue-400' : 'ph-bold ph-gender-female text-pink-400';
                return `
                <div class="glass-panel p-5 rounded-[32px] flex justify-between items-center ripple">
                    <div class="flex gap-4 items-center">
                        <div class="w-12 h-12 rounded-2xl bg-slate-950 flex items-center justify-center border border-slate-800">
                            <i class="${genderIcon} text-xl"></i>
                        </div>
                        <div>
                            <h5 class="text-sm font-bold text-white">${a.nama}</h5>
                            <p class="text-[10px] text-slate-500 uppercase tracking-widest">${a.alamat || '-'}</p>
                        </div>
                    </div>
                    <div>
                        ${isAdmin ? `<button onclick="window.editAlumni('${a.id}')" class="p-2 text-blue-400"><i class="ph-bold ph-pencil"></i></button>` : (a.kontak ? `<a href="https://wa.me/${a.kontak.replace(/\D/g,'').replace(/^0/,'62')}" target="_blank" class="p-3 bg-pesantren-green/10 text-pesantren-green rounded-2xl"><i class="ph-bold ph-whatsapp-logo text-xl"></i></a>` : '')}
                    </div>
                </div>`;
            }).join('');
        }

        function renderLokerList(data) {
            const container = document.getElementById('loker-list'), isAdmin = document.body.classList.contains('is-admin');
            if(!data.length) { container.innerHTML = '<p class="py-10 text-center text-slate-600 italic text-xs">Belum ada info loker.</p>'; return; }
            container.innerHTML = data.map(n => `
                <div class="glass-panel p-4 rounded-3xl border-l-4 border-blue-500 flex justify-between items-center cursor-pointer ripple" onclick="window.openLokerDetail('${n.id}')">
                    <div>
                        <h5 class="text-white font-bold">${n.judul}</h5>
                        <p class="text-[10px] text-slate-400 mt-1">${n.tanggal}</p>
                    </div>
                    ${isAdmin ? `<button onclick="event.stopPropagation(); window.editLoker('${n.id}')" class="text-blue-400 p-2"><i class="ph-bold ph-pencil"></i></button>` : '<i class="ph ph-caret-right text-slate-600"></i>'}
                </div>`).join('');
        }

        function renderSchedules(data) {
            const container = document.getElementById('kajian-list'), isAdmin = document.body.classList.contains('is-admin');
            if(!data.length) { container.innerHTML = '<p class="py-10 text-center text-slate-600 italic text-xs">Jadwal belum ada.</p>'; return; }
            container.innerHTML = data.map(k => `
                <div class="glass-panel p-4 rounded-2xl flex justify-between items-center ripple">
                    <div><p class="text-sm font-bold text-white">${k.kitab}</p><p class="text-[10px] text-pesantren-green">${k.guru}</p></div>
                    <div class="flex items-center gap-3">
                        <span class="text-xs font-bold text-pesantren-gold">${k.waktu}</span>
                        ${isAdmin ? `<button onclick="window.editKajian('${k.id}')" class="text-blue-400"><i class="ph-bold ph-pencil"></i></button>` : ''}
                    </div>
                </div>`).join('');
        }

        function renderConfirms(data) {
            const ver = document.getElementById('donation-verified-list');
            const filtered = data.filter(c => c.status === 'verified');
            if(!filtered.length) { ver.innerHTML = '<p class="text-center text-slate-600 italic text-xs">Belum ada donatur.</p>'; return; }
            ver.innerHTML = filtered.map(c => `<div class="p-4 bg-slate-900/50 rounded-2xl flex justify-between items-center"><p class="text-xs font-bold text-white">${c.nama}</p><p class="text-[10px] text-slate-500">${formatIDR(c.nominal)}</p></div>`).join('');
        }

        // --- ACTIONS ---
        window.deleteItem = async (type, id) => {
            if(!confirm("Hapus data secara permanen?")) return;
            window.showToast("Menghapus...");
            try {
                let sheetType = type === 'kajian' ? 'schedules' : type;
                await fetchAPI('deleteItem', { type: sheetType, id: String(id) });
                history.back(); window.initData(); window.showToast("Berhasil Dihapus");
            } catch(e) { window.showToast("Gagal hapus", "error"); }
        };

        // --- FORM POPULATORS ---
        window.editAlumni = (id) => {
            const a = allAlumni.find(x => String(x.id) === String(id)); if(!a) return;
            document.getElementById('alumniId').value = a.id;
            document.getElementById('alumniNama').value = a.nama;
            document.getElementById('alumniKelamin').value = a.kelamin;
            document.getElementById('alumniAlamat').value = a.alamat;
            document.getElementById('alumniKontak').value = a.kontak || "";
            document.getElementById('btnHapusAlumni').classList.remove('hidden');
            document.getElementById('btnHapusAlumni').onclick = () => window.deleteItem('alumni', a.id);
            toggleModal('alumniFormModal', true);
        };

        window.editLoker = (id) => {
            const n = allLoker.find(x => String(x.id) === String(id)); if(!n) return;
            document.getElementById('lokerId').value = n.id;
            document.getElementById('lokerJudul').value = n.judul;
            document.getElementById('lokerTanggal').value = n.tanggal;
            document.getElementById('lokerIsi').value = n.isi;
            document.getElementById('btnHapusLoker').classList.remove('hidden');
            document.getElementById('btnHapusLoker').onclick = () => window.deleteItem('loker', n.id);
            toggleModal('lokerFormModal', true);
        };

        window.editKajian = (id) => {
            const k = allSchedules.find(x => String(x.id) === String(id)); if(!k) return;
            document.getElementById('kajianId').value = k.id;
            document.getElementById('kajianKitab').value = k.kitab;
            document.getElementById('kajianGuru').value = k.guru;
            document.getElementById('kajianWaktu').value = k.waktu;
            document.getElementById('btnHapusKajian').classList.remove('hidden');
            document.getElementById('btnHapusKajian').onclick = () => window.deleteItem('kajian', k.id);
            toggleModal('kajianFormModal', true);
        };

        window.openLokerDetail = (id) => {
            const n = allLoker.find(x => String(x.id) === String(id)); if(!n) return;
            document.getElementById('newsDetailTitle').innerText = n.judul;
            document.getElementById('newsDetailDate').innerText = n.tanggal;
            document.getElementById('newsDetailContent').innerText = n.isi;
            const isAdmin = document.body.classList.contains('is-admin');
            document.getElementById('newsDetailActions').innerHTML = isAdmin ? `
                <button onclick="window.editLoker('${n.id}');" class="w-full py-3 bg-blue-600 text-white rounded-2xl font-bold ripple">Edit Loker</button>
            ` : `<button onclick="window.open('https://wa.me/6281234567890?text=Lamar+Loker%3A+${n.judul}')" class="w-full py-3 bg-pesantren-green text-slate-950 rounded-2xl font-bold ripple">Lamar via WA</button>`;
            toggleModal('newsDetailModal', true);
        };

        // --- SUBMITS ---
        document.getElementById('alumniForm').addEventListener('submit', async (e) => {
            e.preventDefault(); const btn = e.target.querySelector('button[type="submit"]'); btn.disabled = true;
            const d = { id: document.getElementById('alumniId').value || generateId(), nama: document.getElementById('alumniNama').value, kelamin: document.getElementById('alumniKelamin').value, alamat: document.getElementById('alumniAlamat').value, kontak: document.getElementById('alumniKontak').value };
            window.showToast("Menyimpan..."); await fetchAPI('saveAlumni', d); 
            await window.initData(); history.back(); btn.disabled = false;
        });

        document.getElementById('lokerForm').addEventListener('submit', async (e) => {
            e.preventDefault(); const btn = e.target.querySelector('button[type="submit"]'); btn.disabled = true;
            const d = { id: document.getElementById('lokerId').value || generateId(), judul: document.getElementById('lokerJudul').value, tanggal: document.getElementById('lokerTanggal').value, isi: document.getElementById('lokerIsi').value };
            window.showToast("Menyimpan..."); await fetchAPI('saveLoker', d);
            await window.initData(); history.back(); btn.disabled = false;
        });

        document.getElementById('kajianForm').addEventListener('submit', async (e) => {
            e.preventDefault(); const btn = e.target.querySelector('button[type="submit"]'); btn.disabled = true;
            const d = { id: document.getElementById('kajianId').value || generateId(), kitab: document.getElementById('kajianKitab').value, guru: document.getElementById('kajianGuru').value, waktu: document.getElementById('kajianWaktu').value };
            window.showToast("Menyimpan..."); await fetchAPI('saveSchedule', d);
            await window.initData(); history.back(); btn.disabled = false;
        });

        document.getElementById('userDonasiForm').addEventListener('submit', async (e) => {
            e.preventDefault(); const d = { id: generateId(), nama: document.getElementById('userDonasiNama').value, nominal: document.getElementById('userDonasiNominal').value, status: 'pending' };
            window.showToast("Mengirim..."); await fetchAPI('saveKonfirmasi', d);
            history.back(); window.showToast("Konfirmasi Terkirim!");
        });

        function handleFabAction() {
            if(activePage === 'alumni') { document.getElementById('alumniForm').reset(); document.getElementById('alumniId').value = ""; document.getElementById('btnHapusAlumni').classList.add('hidden'); toggleModal('alumniFormModal', true); }
            else if(activePage === 'loker') { document.getElementById('lokerForm').reset(); document.getElementById('lokerId').value = ""; document.getElementById('btnHapusLoker').classList.add('hidden'); toggleModal('lokerFormModal', true); }
            else if(activePage === 'kajian') { document.getElementById('kajianForm').reset(); document.getElementById('kajianId').value = ""; document.getElementById('btnHapusKajian').classList.add('hidden'); toggleModal('kajianFormModal', true); }
        }

        window.exportAlumniToCSV = () => {
            if(!allAlumni.length) return window.showToast("Data kosong", "error");
            let csv = "ID,Nama,Kelamin,Domisili,Kontak\n";
            allAlumni.forEach(r => csv += `${r.id},"${r.nama}","${r.kelamin}","${r.alamat}","${r.kontak}"\n`);
            const link = document.createElement("a"); link.href = encodeURI("data:text/csv;charset=utf-8," + csv); link.download = "Alumni_IKBAL.csv"; link.click();
        };

        window.filterAlumni = () => {
            const q = document.getElementById('searchInput').value.toLowerCase();
            renderAlumni(allAlumni.filter(a => (a.nama||'').toLowerCase().includes(q) || (a.alamat||'').toLowerCase().includes(q)));
        };

        document.addEventListener('DOMContentLoaded', window.initData);
    </script>
</body>
</html>
